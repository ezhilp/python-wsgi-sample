name: Test Manual Approval Workflow

on:
  workflow_dispatch:
    inputs:
      build_version:
        description: "Build version"
        required: true
        default: "v1.0.0"

jobs:
  step1-prepare:
    runs-on: ubuntu-latest

    outputs:
      app_name: ${{ steps.save.outputs.app_name }}
      build_version: ${{ steps.save.outputs.build_version }}
      image_tag: ${{ steps.save.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Save build details
        id: save
        run: |
          APP_NAME="python-wsgi-sample"
          BUILD_VERSION="${{ github.event.inputs.build_version }}"
          IMAGE_TAG="${APP_NAME}:${BUILD_VERSION}-${{ github.sha }}"

          echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT
          echo "build_version=$BUILD_VERSION" >> $GITHUB_OUTPUT
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

          echo "App Name: $APP_NAME"
          echo "Build Version: $BUILD_VERSION"
          echo "Image Tag: $IMAGE_TAG"

  step2-wait-for-approval:
    runs-on: ubuntu-latest
    needs: step1-prepare

    environment:
      name: manual-approval

    steps:
      - name: Approved message
        run: |
          echo "User approved the workflow."
          echo "Continuing build..."
          echo "App Name: ${{ needs.step1-prepare.outputs.app_name }}"
          echo "Build Version: ${{ needs.step1-prepare.outputs.build_version }}"
          echo "Image Tag: ${{ needs.step1-prepare.outputs.image_tag }}"

  step3-build:
    runs-on: ubuntu-latest
    needs:
      - step1-prepare
      - step2-wait-for-approval

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t "${{ needs.step1-prepare.outputs.image_tag }}" .

      - name: Final message
        run: |
          echo "Docker image build completed after manual approval."
          echo "Image: ${{ needs.step1-prepare.outputs.image_tag }}"